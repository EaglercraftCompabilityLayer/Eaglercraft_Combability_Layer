<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowserCraft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #app { width: 100%; height: 100%; position: relative; }
    /* Loading splash before JS boots */
    #boot-splash {
      position: fixed; inset: 0;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      gap: 16px;
      font-family: monospace; color: #555; font-size: 14px;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #boot-splash.hidden { opacity: 0; pointer-events: none; }
    #boot-logo {
      font-size: 48px; color: #fff;
      text-shadow: 3px 3px 0 #333;
      letter-spacing: 4px;
    }
    #boot-logo span { color: #ffff55; }
    #boot-bar-track {
      width: 300px; height: 6px;
      background: #222; border-radius: 3px; overflow: hidden;
    }
    #boot-bar {
      height: 100%; width: 0%;
      background: #55ff55;
      transition: width 0.3s;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <!-- Boot splash — hidden once JS is ready -->
  <div id="boot-splash">
    <div id="boot-logo">Browser<span>Craft</span></div>
    <div id="boot-bar-track"><div id="boot-bar"></div></div>
    <div id="boot-status">Loading…</div>
  </div>

  <!-- Main app container — all screens render here -->
  <div id="app"></div>

  <!-- Boot progress animation (pure CSS, no JS needed) -->
  <script>
    (function () {
      const bar    = document.getElementById('boot-bar');
      const status = document.getElementById('boot-status');
      let p = 0;
      const steps  = ['Loading engine…', 'Preparing assets…', 'Starting client…', 'Ready!'];
      let step = 0;
      const iv = setInterval(() => {
        p = Math.min(p + 4, 95);
        bar.style.width = p + '%';
        if (p > step * 25 && step < steps.length) status.textContent = steps[step++];
      }, 60);
      window.__bootDone = function () {
        clearInterval(iv);
        bar.style.width = '100%';
        status.textContent = 'Ready!';
        setTimeout(() => { document.getElementById('boot-splash').classList.add('hidden'); }, 400);
      };
    })();
  </script>

  <script src="./public/bundle.js"></script>
</body>
</html>
